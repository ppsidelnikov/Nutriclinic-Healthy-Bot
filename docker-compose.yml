services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nutriclinic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: nutriclinic_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nutriclinic_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: nutriclinic_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  redisinsight:
    image: redis/redisinsight:latest
    container_name: nutriclinic_redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nutriclinic_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: "true"
      REDIS_URL: redis://redis:6379
      NO_PROXY: "minio,postgres,redis,localhost,127.0.0.1"
      no_proxy: "minio,postgres,redis,localhost,127.0.0.1"
      # Сеть из контейнера к huggingface.co не пускает — используем кэш модели
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      DB_ECHO: "0"
    volumes:
      - ./docs:/app/docs:ro
      # Живой mount исходного кода — правки в src/ и alembic/ подхватываются
      # без пересборки образа. Подходит для разработки и dev-режима.
      - ./src:/app/src
      - ./alembic:/app/alembic
      # Маунт нагрузочного эксперимента
      - ./experiments/exp_03_load:/app/experiments/exp_03_load
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  redis_data:
